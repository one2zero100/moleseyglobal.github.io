<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styles -->
    <link rel="stylesheet" href="/style.css?v=1.0.15">
    <link rel="icon" type="image/png" href="/logo.png">

    <style>
        .blog-header {
            text-align: center;
            margin: 120px 0 40px;
        }

        .blog-header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .blog-header p {
            font-size: 18px;
            opacity: 0.8;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }

        .blog-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            transition: 0.25s ease;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .blog-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.08);
        }

        .blog-card h3 {
            margin: 0 0 10px;
            font-size: 22px;
        }

        .blog-card .date {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 12px;
        }

        .blog-card p {
            opacity: 0.85;
            margin-bottom: 16px;
        }

        .read-more {
            color: #4da3ff;
            font-weight: 600;
        }
    </style>
</head>

<body class="dark">

<!-- ============================
     HEADER (ĐỒNG BỘ TRANG CHỦ)
============================ -->
<header class="header">
    <div class="header-inner">

        <!-- Logo -->
        <div class="logo">
            <a href="/index.html">
                <img src="/logo.png" alt="Molesey Global Network Logo">
            </a>
        </div>

        <!-- Navigation -->
        <nav class="nav">
            <a href="/index.html#news" data-i18n="navbar.news"></a>
            <a href="/index.html#products" data-i18n="navbar.products"></a>
            <a href="/index.html#vision" data-i18n="navbar.vision"></a>
            <a href="/about.html" data-i18n="navbar.about"></a>
            <a href="/blog/index.html" data-i18n="navbar.blog"></a>
            <a href="/index.html#contact" data-i18n="navbar.contact"></a>
        </nav>

        <!-- Icons -->
        <div class="header-icons">
            <button id="darkToggle">🌙</button>
            <button id="lang-toggle">🇻🇳</button>
        </div>

    </div>
</header>

<!-- ============================
     BLOG CONTENT
============================ -->
<main class="container">

    <div class="blog-header">
        <h1 data-i18n="blog.title">Blog</h1>
        <p data-i18n="blog.subtitle">Latest updates and insights.</p>
    </div>

    <div id="blog-list" class="blog-grid"></div>

</main>

<!-- ============================
     FOOTER (ĐỒNG BỘ TRANG CHỦ)
============================ -->
<footer class="footer">
    <p>© 2026 Molesey Global Network Ltd</p>
    <p>
        <a href="/privacy.html">Privacy Policy</a> |
        <a href="/terms.html">Terms of Service</a>
    </p>
</footer>

<!-- ============================
     SCRIPTS
============================ -->
<script src="/assets/js/lang.js?v=1.0.15"></script>
<script src="/assets/js/darkmode.js?v=1.0.15"></script>
<script src="/assets/js/header-grow.js?v=1.0.15"></script>
<script src="/blog/blog.js?v=1.0.15"></script>
<script src="/about/about.js"></script>

</body>
</html>
