<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Molesey Global Network Ltd</title>
    <meta name="description" content="Molesey Global Network Ltd – Building modern, human‑centered digital products in the UK.">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=1.0.10">

    <!-- Favicon (optional) -->
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="dark">

<!-- ============================
     HEADER
============================ -->
<header class="header">
    <div class="container header-inner">

        <!-- Logo -->
        <div class="logo">
            <img src="logo.png" alt="Molesey Global Network Logo">
        </div>

        <!-- Navigation -->
        <nav class="nav">
            <a href="#news" data-i18n="navbar.news"></a>
            <a href="#products" data-i18n="navbar.products"></a>
            <a href="#vision" data-i18n="navbar.vision"></a>
            <a href="#about" data-i18n="navbar.about"></a>
            <a href="blog/index.html" data-i18n="navbar.blog"></a>
            <a href="#contact" data-i18n="navbar.contact"></a>
        </nav>

        <!-- Icons -->
        <div class="header-icons">
            <button id="darkToggle">🌙</button>
            <button id="lang-toggle">🇻🇳</button>
        </div>

    </div>
</header>

<!-- ============================
     MAIN CONTENT
============================ -->
<main class="container">

    <!-- HERO -->
    <section id="news" class="hero">
        <img src="hero.jpg" class="hero-img" alt="Digital innovation">
        <h1 class="hero-title" data-i18n="home.hero_title"></h1>
        <p class="hero-desc" data-i18n="home.hero_desc"></p>
    </section>

    <!-- NEWS GRID -->
    <section class="news-grid">
        <article class="news-card">
            <img src="img1.jpg" alt="">
            <h3 data-i18n="home.card1_title"></h3>
            <p data-i18n="home.card1_desc"></p>
        </article>

        <article class="news-card">
            <img src="img2.jpg" alt="">
            <h3 data-i18n="home.card2_title"></h3>
            <p data-i18n="home.card2_desc"></p>
        </article>

        <article class="news-card">
            <img src="img3.jpg" alt="">
            <h3 data-i18n="home.card3_title"></h3>
            <p data-i18n="home.card3_desc"></p>
        </article>
    </section>

    <!-- ABOUT / WHAT WE DO -->
    <section id="about" class="section-block">
        <h2 class="section-title" data-i18n="home.what_we_do_title"></h2>

        <div class="feature-list">
            <div class="feature-item">
                <h4 data-i18n="home.feature1_title"></h4>
                <p data-i18n="home.feature1_desc"></p>
            </div>

            <div class="feature-item">
                <h4 data-i18n="home.feature2_title"></h4>
                <p data-i18n="home.feature2_desc"></p>
            </div>

            <div class="feature-item">
                <h4 data-i18n="home.feature3_title"></h4>
                <p data-i18n="home.feature3_desc"></p>
            </div>
        </div>
    </section>

    <!-- PRODUCTS -->
    <section id="products" class="section-block">
        <h2 class="section-title" data-i18n="home.products_title"></h2>

        <div class="product-card">
            <h3 data-i18n="home.product1_title"></h3>
            <p data-i18n="home.product1_desc"></p>
        </div>

        <p data-i18n="home.products_more"></p>
    </section>

    <!-- VISION -->
    <section id="vision" class="section-block">
        <h2 class="section-title" data-i18n="home.vision_title"></h2>
        <p data-i18n="home.vision_desc"></p>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section-block">
        <h2 class="section-title" data-i18n="home.contact_title"></h2>

        <p>Email: support@moleseyglobal.com</p>
        <p data-i18n="home.contact_registered"></p>
        <p>Molesey Global Network Ltd</p>
        <p>28 Vine Rd, East Molesey, KT8 9LF, United Kingdom</p>
    </section>

</main>

<!-- ============================
     FOOTER
============================ -->
<footer class="footer">
    <p>© 2026 Molesey Global Network Ltd</p>
    <p>
        <a href="/privacy.html">Privacy Policy</a> |
        <a href="/terms.html">Terms of Service</a>
    </p>
</footer>

<!-- ============================
     SCRIPTS
============================ -->
<script src="../assets/js/lang.js"></script>
<script src="/assets/js/darkmode.js"></script>
<script src="/assets/js/header-grow.js"></script>
<script src="blog.js"></script>

</body>
</html>
